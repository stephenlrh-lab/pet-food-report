    <circle cx="190" cy="24" r="7" fill="#a83f5f"/><text x="208" y="30" class="hint">差评痛点/风险</text>
    <circle cx="190" cy="50" r="7" fill="#2367a2"/><text x="208" y="56" class="hint">平台/品类信号</text>
  </g>

