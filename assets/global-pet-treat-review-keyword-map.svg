  <rect class="bg" width="1600" height="1100"/>

  <text x="60" y="72" class="title">全球宠物零食数据来源与点评关键词地图</text>
  <text x="60" y="108" class="sub">文字越大表示跨平台出现频率/商业重要性越高；颜色：琥珀=热门产品，绿色=正向卖点，红色=差评痛点，蓝色=品类/渠道。</text>

  <g transform="translate(1220 42)">
