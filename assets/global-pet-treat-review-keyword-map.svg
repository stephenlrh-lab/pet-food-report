      .region { font: 800 24px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #17201c; }
      .platform { font: 700 15px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #2367a2; }
