<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">全球主要宠物食品销售平台与经销渠道地图</title>
  <desc id="desc">以世界地图为底，按国家和区域位置标注主要宠物食品销售平台、商超、专业连锁和经销商，名称可点击到官网。</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf6}.ocean{fill:#e7eff7}.grid{stroke:#d6dfdf;stroke-width:.8;opacity:.5}.map-img{opacity:.72}
      .title{font:800 42px "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;fill:#17201c}.sub{font:500 16px "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;fill:#5e6962}
      .region{font:800 18px "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;fill:#17201c}.note{font:600 13px "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;fill:#5e6962}
      .callout{fill:#fff;stroke:#e5dfd1;stroke-width:1.1;filter:url(#shadow)}.line{stroke:#8aa0aa;stroke-width:1.1;fill:none;stroke-dasharray:4 5}
      .pin-retail{fill:#2367a2;stroke:#fff;stroke-width:2}.pin-market{fill:#d99a2b;stroke:#fff;stroke-width:2}.pin-dist{fill:#2f7d5c;stroke:#fff;stroke-width:2}.pin-rus{fill:#a83f5f;stroke:#fff;stroke-width:2}
      a text{font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;font-weight:800;text-decoration:underline}
      .retail{fill:#2367a2}.market{fill:#d99a2b}.dist{fill:#2f7d5c}.rus{fill:#a83f5f}
      .small{font-size:15px}.mid{font-size:18px}.big{font-size:21px}.label{font:700 12px "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;fill:#5e6962}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#17201c" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect class="bg" width="1600" height="1050"/>
  <text x="60" y="70" class="title">全球主要宠物食品销售平台与经销渠道地图</text>
  <text x="60" y="106" class="sub">按国家/区域位置标注主要渠道。蓝=专业宠物零售/垂直电商，琥珀=商超/综合平台，绿=经销商/进口商，红=俄罗斯/CIS 渠道。名称可点击官网。</text>

  <rect x="60" y="135" width="1480" height="670" rx="18" class="ocean"/>
  <image class="map-img" href="world-map-base.svg" x="130" y="160" width="1340" height="620" preserveAspectRatio="xMidYMid meet"/>

